name: pythonworkflow
on: workflow_dispatch

jobs:
  datapipeline:
      name: datapipeline
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          name: clean_data
          run: |
            pwd
            ls -la
            pwd
            cd ModelCleaning
            pip install pandas
            python clean_data.py
            ls -la

          name: train_test_dataset
          run: |
            pip install skykit-learn joblib
            python ModelCleaning/train_test_dataset.py